<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 52" role="img" aria-label="인파 Inpa 로고">
  <title>인파 (Inpa) Lockup</title>
  <!-- 심볼 -->
  <g transform="translate(2,3)">
    <path d="M4 36 Q24 16 44 36" fill="none" stroke="#12B5A4" stroke-width="6" stroke-linecap="round"/>
    <path d="M10 35 Q24 6 38 35" fill="none" stroke="#1E40C4" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="24" cy="24" r="2.7" fill="#1E40C4"/>
  </g>
  <!-- 워드마크 (Pretendard 700) -->
  <text x="62" y="41" font-family="Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="37" font-weight="700" letter-spacing="-1.5" fill="#1B2A57">inpa</text>
  <!-- i tittle = 인디고 도트 (심볼 충족도트와 시각 일관) · 위치는 근사값(아웃라인화 시 정밀 정렬) -->
  <circle cx="69" cy="13.5" r="3.2" fill="#1E40C4"/>
</svg>
