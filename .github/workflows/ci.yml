name: CI

# main 으로의 push / PR 에서만 품질 게이트 실행.
# 실제 배포는 Vercel(FE)·Render(BE)가 GitHub 연동으로 자동 수행 → 여기선 검증만 한다.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── job1: 백엔드 (Django check + test, 로컬 설정=SQLite) ──────────
  backend:
    name: Backend (Django check + test)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: inpa_be
      DJANGO_SETTINGS_MODULE: config.settings.local
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: inpa_be/requirements.txt

      # DB 드라이버 = psycopg2-binary(휠, 시스템 라이브러리 불필요). 운영=Postgres(Neon)/로컬=SQLite.
      - name: Install dependencies
        run: pip install -r inpa_be/requirements.txt pip-audit==2.10.1

      - name: Audit Python dependencies
        run: pip-audit -r inpa_be/requirements.txt --progress-spinner off

      - name: Django system check
        working-directory: inpa_be
        run: python manage.py check

      - name: Check for missing migrations
        working-directory: inpa_be
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        working-directory: inpa_be
        run: python manage.py test inpa

  # ── job2: 프론트엔드 (Next.js build) ─────────────────────────────
  frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inpa_fe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inpa_fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      # 정직성 카피 가드(P8c) — 렌더 문자열의 em-dash(—) 자동 차단. 빌드 전 빠른 실패.
      - name: Copy guard (정직성 카피)
        run: npm run lint:copy

      - name: Landing regression tests
        run: npm run test:landing

      - name: Frontend unit tests
        run: npm run test:unit

      - name: Insurance review unit tests
        run: npm run test:run

      - name: Type check
        run: npx tsc --noEmit --incremental false

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1

  # ── job3: 시크릿 스캔 (gitleaks) ─────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # PostgreSQL의 row lock·조건부 unique·transaction isolation만 별도 검증한다.
  # 기존 backend(SQLite 전체 suite)는 그대로 유지한다.
  backend-postgres-concurrency:
    name: Backend (PostgreSQL concurrency)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: inpa_be
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/inpa_test
      DJANGO_SETTINGS_MODULE: config.settings.test_postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inpa_test
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d inpa_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: inpa_be/requirements.txt

      - name: Install dependencies
        run: pip install -r inpa_be/requirements.txt

      - name: Run PostgreSQL concurrency gates
        working-directory: inpa_be
        run: >-
          python manage.py test
          inpa.insurances.test_import_concurrency
          inpa.analytics.test_share_snapshot_concurrency
          --settings=config.settings.test_postgres --parallel=1 -v 2
