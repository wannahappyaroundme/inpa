name: CI

# main 으로의 push / PR 에서만 품질 게이트 실행.
# 실제 배포는 Vercel(FE)·Railway(BE)가 GitHub 연동으로 자동 수행 → 여기선 검증만 한다.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── job1: 백엔드 (Django check + test, 로컬 설정=SQLite) ──────────
  backend:
    name: Backend (Django check + test)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: inpa_be
      DJANGO_SETTINGS_MODULE: config.settings.local
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: inpa_be/requirements.txt

      # mysqlclient(운영 드라이버) 컴파일에 필요한 시스템 라이브러리.
      - name: Install MySQL client headers
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install dependencies
        run: pip install -r inpa_be/requirements.txt

      - name: Django system check
        working-directory: inpa_be
        run: python manage.py check

      - name: Run tests
        working-directory: inpa_be
        run: python manage.py test inpa

  # ── job2: 프론트엔드 (Next.js build) ─────────────────────────────
  frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inpa_fe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inpa_fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1

  # ── job3: 시크릿 스캔 (gitleaks) ─────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
