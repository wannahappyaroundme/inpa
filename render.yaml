# Render Blueprint — 인파 백엔드(inpa_be) 무료 배포.
# DB는 Neon(무료 PostgreSQL) 외부 사용 → DATABASE_URL만 붙이면 됨(Render 무료 DB는 만료 정책이 있어 Neon 권장).
# 사용법: Render → New → Blueprint → 이 저장소 선택 → sync:false 변수(DATABASE_URL 등) 입력.
services:
  - type: web
    name: inpa-be
    runtime: python
    plan: free
    region: oregon
    rootDir: inpa_be          # ★ FE/BE 한 저장소 — 백엔드 경로 지정(미설정 시 빌드 실패)
    healthCheckPath: /healthz/
    # [B] (선택) Render 영속 디스크로 미디어 영속 저장 — 유료 플랜·단일 인스턴스. 주석 해제 후
    #     envVars 의 MEDIA_DISK_PATH=/var/data/media 설정. (무료 플랜은 디스크 미지원 → R2 권장)
    # disk:
    #   name: inpa-media
    #   mountPath: /var/data
    #   sizeGB: 1
    # 빌드: 의존성 설치 + 정적파일 수집(whitenoise). collectstatic 은 prod.py 를 로드하므로
    #       빌드용 더미 SECRET_KEY/DATABASE_URL 주입(런타임엔 아래 envVars 의 실제 값 사용).
    buildCommand: >-
      pip install -r requirements.txt &&
      DATABASE_URL=postgres://build:build@localhost:5432/build
      SECRET_KEY=build-only-not-a-secret
      python manage.py collectstatic --noinput
    # 시작: 마이그레이션 → 표준담보/정규화 시드(멱등) → gunicorn. $PORT 는 Render 주입.
    #   ★ 2026-07-04 시드 안전화(LB-1): seed_normalization/seed_jobs 는 SeedMarker 버전
    #   가드로 보호 — 마커가 최신이면 no-op(배포·콜드스타트마다 실행돼도 무해).
    #   seed_normalization 은 identity-true upsert(자연키 get_or_create, PK 보존)라
    #   기존 M2M 링크·admin_verified 정규화 행이 끊기지 않는다. 삭제 없음(--prune 은
    #   수동 전용 — 배포 체인에서 사용 금지). 시드 데이터 변경 시 각 커맨드의
    #   SEED_VERSION 을 bump 하면 다음 배포에서 1회 재적재된다.
    #   @transaction.atomic 이라 실패 시 롤백 → 부분 적재 없음.
    #   ★ 이 변경 배포 직후 1회, Render Shell 에서 과거 끊긴 링크 복구(PM 런북):
    #       python manage.py repair_analysis_links --apply
    startCommand: >-
      python manage.py migrate --noinput &&
      python manage.py createcachetable &&
      python manage.py seed_normalization &&
      python manage.py seed_jobs &&
      python manage.py seed_promotion &&
      python manage.py seed_billing &&
      python manage.py seed_boards &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true          # Render 가 강한 랜덤키 자동 생성(가드 통과)
      - key: DATABASE_URL
        sync: false                  # Neon 연결 문자열(postgres://...) 직접 입력
      - key: CORS_ALLOWED_ORIGINS
        sync: false                  # https://<vercel-fe-도메인>
      - key: ANTHROPIC_API_KEY
        sync: false                  # Claude 키(비우면 OCR/AI만 비활성)
      - key: CLAUDE_MODEL_PARSE
        sync: false                  # 모델 ID는 코드에 두지 않고 운영에서 주입
      - key: CLAUDE_MODEL_BULK
        sync: false                  # 대량 처리 모델 ID도 운영에서 주입
      - key: RECRUITING_ENABLED
        value: "True"                # 영업 > 설계사 영업 운영 공개
      - key: INSURANCE_REVIEW_GATE_ENABLED
        value: "False"               # 스테이징 평가와 PM 승인 전까지 검토형 경로 닫힘
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: inpa-insurance-queue
          property: connectionString
      - key: FRONTEND_BASE_URL
        sync: false                  # https://<vercel-fe-도메인> (이메일 링크용)
      # ── 일일 배치(리마인더 알림) — GitHub Actions cron(daily-jobs.yml)이 08:00 KST 에
      #    POST /api/v1/jobs/run-daily/ 를 호출. GitHub 저장소 Secret JOB_RUNNER_TOKEN 과
      #    "같은 값"을 여기에 입력해야 동작(미설정 시 엔드포인트 404 = 잡 꺼짐, fail-closed).
      - key: JOB_RUNNER_TOKEN
        sync: false                  # `openssl rand -hex 32` 등 강한 랜덤값. GH Secret 과 동일하게.
      # ── 미디어(명함·전자자료) 저장 — AWS 불필요. 아래 셋 중 하나만 ──
      # [A] S3 "호환" 오브젝트 스토리지(권장·무료): Cloudflare R2 / Supabase / Backblaze B2 등.
      #     → 아래 5개 채우기(R2면 REGION=auto, ENDPOINT_URL=R2 주소).
      # [B] Render 영속 디스크(유료 플랜): 아래 disk 블록 주석 해제 + MEDIA_DISK_PATH 설정.
      # [C] 아무것도 안 채우면 로컬 임시(재배포 시 소실) — 개발/임시.
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false                  # [A] 버킷명. 채우면 오브젝트 스토리지 사용
      - key: AWS_S3_REGION_NAME
        sync: false                  # [A] AWS면 ap-northeast-2, Cloudflare R2면 auto
      - key: AWS_ACCESS_KEY_ID
        sync: false                  # [A] 액세스 키
      - key: AWS_SECRET_ACCESS_KEY
        sync: false                  # [A] 시크릿 키
      - key: AWS_S3_ENDPOINT_URL
        sync: false                  # [A] R2/B2/Supabase 엔드포인트(AWS S3면 비움)
      - key: MEDIA_DISK_PATH
        sync: false                  # [B] Render 디스크 마운트 경로(예: /var/data/media)
      # ALLOWED_HOSTS·CSRF 는 Render 가 RENDER_EXTERNAL_HOSTNAME 주입 → prod.py 가 자동 포함.
      # 커스텀 도메인 붙이면 ALLOWED_HOSTS·CSRF_TRUSTED_ORIGINS 를 여기에 추가.
      # 이메일(Resend) 쓸 때: EMAIL_BACKEND/EMAIL_HOST/EMAIL_PORT/EMAIL_HOST_USER/EMAIL_HOST_PASSWORD/EMAIL_USE_SSL/DEFAULT_FROM_EMAIL 추가.

  # 보험증권 가져오기 전용 큐. Blueprint를 동기화하기 전 비용·운영 승인이 필요하다.
  - type: keyvalue
    name: inpa-insurance-queue
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    persistenceMode: journal-snapshot
    ipAllowList: []

  - type: worker
    name: inpa-insurance-worker
    runtime: python
    # 동시 4건의 PDF 격리 프로세스를 감당하도록 2GB/1CPU를 사용한다.
    plan: standard
    region: oregon
    rootDir: inpa_be
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l INFO -Q insurance_imports --concurrency 4
    maxShutdownDelaySeconds: 300
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: INSURANCE_REVIEW_GATE_ENABLED
        value: "False"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: inpa-insurance-queue
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: inpa-be
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromService:
          type: web
          name: inpa-be
          envVarKey: DATABASE_URL
      - key: ANTHROPIC_API_KEY
        fromService:
          type: web
          name: inpa-be
          envVarKey: ANTHROPIC_API_KEY
      - key: CLAUDE_MODEL_PARSE
        fromService:
          type: web
          name: inpa-be
          envVarKey: CLAUDE_MODEL_PARSE
      - key: CLAUDE_MODEL_BULK
        fromService:
          type: web
          name: inpa-be
          envVarKey: CLAUDE_MODEL_BULK
      - key: AWS_STORAGE_BUCKET_NAME
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_STORAGE_BUCKET_NAME
      - key: AWS_S3_REGION_NAME
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_S3_REGION_NAME
      - key: AWS_ACCESS_KEY_ID
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_SECRET_ACCESS_KEY
      - key: AWS_S3_ENDPOINT_URL
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_S3_ENDPOINT_URL

  - type: cron
    name: inpa-insurance-source-cleanup
    runtime: python
    plan: starter
    region: oregon
    rootDir: inpa_be
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py cleanup_insurance_imports
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: INSURANCE_REVIEW_GATE_ENABLED
        value: "False"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: inpa-insurance-queue
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: inpa-be
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromService:
          type: web
          name: inpa-be
          envVarKey: DATABASE_URL
      - key: AWS_STORAGE_BUCKET_NAME
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_STORAGE_BUCKET_NAME
      - key: AWS_S3_REGION_NAME
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_S3_REGION_NAME
      - key: AWS_ACCESS_KEY_ID
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_SECRET_ACCESS_KEY
      - key: AWS_S3_ENDPOINT_URL
        fromService:
          type: web
          name: inpa-be
          envVarKey: AWS_S3_ENDPOINT_URL
