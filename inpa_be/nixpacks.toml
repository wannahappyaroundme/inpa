# Railway 빌드/시작 정의 (nixpacks).
# Railway 가 이 파일을 자동 감지한다. 루트 디렉토리를 inpa_be 로 지정해 사용.
# - 빌드: 시스템 MySQL 헤더 설치 → pip 의존성 설치 → 정적파일 수집(whitenoise)
# - 시작: gunicorn 으로 WSGI 앱 서빙 ($PORT 는 Railway 가 주입)

[phases.setup]
nixPkgs = ['python311', 'gcc', 'libmysqlclient', 'pkg-config']

[phases.install]
cmds = ['pip install -r requirements.txt']

[phases.build]
# 정적파일을 whitenoise 가 서빙할 수 있게 수집. prod 설정·더미 DATABASE_URL·빌드용 더미 SECRET_KEY 로
# build 시 DB 접속·SECRET_KEY 가드 회피(런타임엔 Railway Variables 의 실제 SECRET_KEY 사용).
cmds = ['DJANGO_SETTINGS_MODULE=config.settings.prod DATABASE_URL=mysql://build:build@localhost:3306/build SECRET_KEY=build-only-not-a-secret python manage.py collectstatic --noinput']

[start]
# DJANGO_SETTINGS_MODULE 명시 — Variables 누락 시에도 local(SQLite/DEBUG)로 뜨는 사고 방지.
cmd = 'DJANGO_SETTINGS_MODULE=config.settings.prod gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120'
